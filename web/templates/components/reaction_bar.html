{{ define "reaction_bar" }}

<div class="reactions" data-post id="{{ .ID }}">
    <button class="react-btn" data-type="like">👍</button>
    <button class="react-btn" data-type="love">❤️</button>
    <button class="react-btn" data-type="clap">👏</button>
    <button class="react-btn" data-type="fire">🔥</button>
</div>
{{ end }}
