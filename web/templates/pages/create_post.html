{{ define "content" }}

<h2>Create Post</h2>

<form action="/post/create" method="POST" enctype="multipart/form-data" class="form">

<input type="text" name="title" placeholder="Title" required>

<textarea name="description" placeholder="shortdescription"></textarea>

<textarea name="content" placeholder="Write your content here..."></textarea>

<select name="type">
    <option value="blog">Blog</option>
    <option value="poem">Poem</option>
    <option value="song">Song</option>
</select>

<input type="file" name="file">

<button type="submit">Publish</button>
</form>

{{ end }}
